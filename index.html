<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>백야의 꽃길 MD 計算器</title>
<style>
  :root {
    --cream: #F5EFE4;
    --warm-white: #FBF7F0;
    --gold: #B8934A;
    --gold-light: #D9BA84;
    --gold-dark: #7A5C1E;
    --brown: #4A2E12;
    --brown-light: #7A5533;
    --brown-mid: #3A2210;
    --text: #2C1A08;
    --text-muted: #6B4C2A;
    --text-light: #9C7A55;
    --border: rgba(184,147,74,0.22);
    --border-strong: rgba(184,147,74,0.45);
    --surface: rgba(251,247,240,0.92);
    --green-bg: #EAF0E6;
    --green-text: #2D5A1E;
    --amber-bg: #F5E8CC;
    --amber-text: #6B3E00;
    --dark-block: #2C1A08;
    --dark-block-2: #3D2510;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', 'Noto Serif TC', serif;
    background-color: var(--cream);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(184,147,74,0.10) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 90%, rgba(122,92,30,0.08) 0%, transparent 50%);
  }

  .page-wrapper {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .header-eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: 'Helvetica Neue', sans-serif;
  }
  .header h1 {
    font-size: 26px;
    font-weight: normal;
    color: var(--brown);
    letter-spacing: 0.05em;
    line-height: 1.3;
  }
  .header h1 em {
    font-style: italic;
    color: var(--gold-dark);
  }
  .header-sub {
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-light);
    font-family: 'Helvetica Neue', sans-serif;
    letter-spacing: 0.05em;
  }
  .rate-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
    background: var(--amber-bg);
    color: var(--amber-text);
    font-size: 11px;
    font-family: 'Helvetica Neue', sans-serif;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(184,147,74,0.3);
  }
  .rate-pill-input {
    width: 36px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--amber-text);
    color: var(--amber-text);
    font-size: 11px;
    font-family: 'Helvetica Neue', sans-serif;
    text-align: center;
    outline: none;
    padding: 0 1px;
  }
  .rate-pill-input:focus { border-bottom-color: var(--gold-dark); }

  /* Summary sticky */
  .summary-sticky {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(245,239,228,0.97);
    border-bottom: 1px solid var(--border);
    padding: 10px 0;
    margin-bottom: 24px;
    backdrop-filter: blur(8px);
  }
  .summary-inner {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  /* KRW block */
  .summary-krw-block {
    background: var(--dark-block);
    border-radius: 10px;
    padding: 8px 16px 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }
  .summary-krw-label {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    color: #A08060;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .summary-krw-amount {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #F5E8CC;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .summary-krw-rate-wrap {
    display: flex;
    align-items: center;
    gap: 3px;
    margin-top: 2px;
  }
  .summary-krw-rate-prefix {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    color: #A08060;
  }

  /* USD block */
  .summary-usd-block {
    background: var(--dark-block-2);
    border-radius: 10px;
    padding: 8px 16px 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }
  .summary-usd-label-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }
  .summary-usd-tag {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    color: #A08060;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .rate-input-wrap {
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .rate-input-prefix {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    color: #A08060;
  }
  .rate-input {
    width: 52px;
    background: transparent;
    border: none;
    border-bottom: 1px solid #6B4C2A;
    color: #C9A87A;
    font-size: 11px;
    font-family: 'Helvetica Neue', sans-serif;
    text-align: center;
    outline: none;
    padding: 1px 2px;
  }
  .rate-input:focus { border-bottom-color: var(--gold-light); }
  .summary-usd-amount {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #F5E8CC;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .summary-usd-prefix {
    font-size: 13px;
    font-weight: 400;
    color: #A08060;
    margin-right: 2px;
  }

  /* Gift badge area */
  .summary-gift-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }
  .summary-gift-badges {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .gift-badge-block {
    border-radius: 8px;
    padding: 5px 12px;
    text-align: center;
    min-width: 64px;
  }
  .gift-badge-block-label {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .gift-badge-block-val {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 16px;
    font-weight: 700;
    line-height: 1;
  }
  .gift-none-block { background: #E8DDD0; }
  .gift-none-block .gift-badge-block-label { color: #9C7A55; }
  .gift-none-block .gift-badge-block-val { color: #7A5533; }
  .gift-one-block { background: var(--amber-bg); }
  .gift-one-block .gift-badge-block-label { color: #8B5E00; }
  .gift-one-block .gift-badge-block-val { color: var(--amber-text); }
  .gift-two-block { background: var(--green-bg); }
  .gift-two-block .gift-badge-block-label { color: #3A6E22; }
  .gift-two-block .gift-badge-block-val { color: var(--green-text); }

  .summary-gift-label {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    color: var(--text-light);
    letter-spacing: 0.05em;
  }

  /* Section */
  .section-title {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    padding-left: 2px;
  }

  /* Item rows */
  .items-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 32px;
  }

  .item-row {
    display: grid;
    grid-template-columns: 60px 1fr auto auto;
    align-items: center;
    gap: 10px;
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .item-row:hover { border-color: var(--border-strong); }
  .item-row.active {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px rgba(184,147,74,0.15);
  }

  .item-img {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 8px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .item-name {
    font-size: 14px;
    color: var(--text);
    line-height: 1.3;
  }
  .item-sub {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
  }
  .item-price-col {
    text-align: right;
    min-width: 72px;
  }
  .item-price-krw {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
  }
  .item-price-usd {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    color: var(--text-light);
  }

  .qty-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .qty-btn {
    width: 30px;
    height: 30px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    background: var(--cream);
    color: var(--brown);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.15s;
    font-family: 'Helvetica Neue', sans-serif;
  }
  .qty-btn:hover { background: var(--gold-light); border-color: var(--gold); }
  .qty-btn:active { transform: scale(0.94); }
  .qty-val {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 15px;
    font-weight: 600;
    min-width: 22px;
    text-align: center;
    color: var(--brown);
  }

  /* Gift detail */
  .gift-detail {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 20px;
  }
  .gift-detail-header {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .gift-milestones {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .milestone {
    background: var(--cream);
    border-radius: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .milestone.reached {
    border-color: var(--gold);
    background: var(--amber-bg);
  }
  .milestone-label {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-light);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .milestone-amount {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--brown);
  }
  .milestone-usd {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    color: var(--text-light);
    margin-top: 1px;
  }
  .milestone-reward {
    font-size: 11px;
    color: var(--gold-dark);
    margin-top: 4px;
  }
  .milestone.reached .milestone-label { color: var(--amber-text); }
  .milestone.reached .milestone-amount { color: var(--gold-dark); }

  .progress-track {
    height: 5px;
    background: #DDD0BB;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-light), var(--gold));
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .progress-hint {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    color: var(--text-light);
    margin-top: 7px;
  }

  /* Reset */
  .reset-btn {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'Helvetica Neue', sans-serif;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s, color 0.2s;
  }
  .reset-btn:hover { background: #DDD0BB; color: var(--brown); }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.05em;
  }

  @media (max-width: 480px) {
    .header h1 { font-size: 21px; }
    .summary-inner { flex-wrap: wrap; gap: 8px; }
    .summary-krw-block, .summary-usd-block { flex: 1; min-width: 130px; }
    .summary-gift-wrap { flex-basis: 100%; flex-direction: row; align-items: center; justify-content: space-between; }
    .item-row { grid-template-columns: 1fr; gap: 8px; }
    .item-price-col { display: none; }
    .gift-milestones { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="summary-sticky" id="sticky-bar">
  <div class="summary-inner">

    <div class="summary-krw-block">
      <div>
        <div class="summary-krw-label">總計 KRW</div>
        <div class="summary-krw-usd" id="top-usd" style="font-family:'Helvetica Neue',sans-serif;font-size:11px;color:#A08060;margin-top:3px;">$0.00</div>
      </div>
      <div>
        <div class="summary-krw-amount" id="top-krw">₩0</div>
      </div>
    </div>

    <div class="summary-usd-block">
      <div class="summary-usd-label-wrap">
        <div class="summary-usd-tag">TWD</div>
        <div class="rate-input-wrap" style="margin-top:3px;">
          <span class="rate-input-prefix">$1=NT$</span>
          <input id="usd-twd-rate" type="number" value="32.5" step="0.1" min="0.1" class="rate-input" oninput="updateSummary()">
        </div>
      </div>
      <div class="summary-usd-amount">
        <span class="summary-usd-prefix">NT$</span><span id="top-twd">0</span>
      </div>
    </div>

    <div class="summary-gift-wrap">
      <div class="summary-gift-label">滿額贈卡</div>
      <div class="summary-gift-badges">
        <div class="gift-badge-block gift-none-block" id="top-badge-block">
          <div class="gift-badge-block-label">張數</div>
          <div class="gift-badge-block-val" id="top-badge-val">0</div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="page-wrapper">

  <div class="header">
    <div class="header-eyebrow">MD 購買計算器</div>
    <h1><em>백야의 꽃길</em><br>白夜之花</h1>
    <div class="header-sub">選擇商品數量，即時換算金額與滿額特典</div>
    <div class="rate-pill">
      匯率參考：₩<input id="krw-unit" type="number" value="5000" step="100" min="1" class="rate-pill-input" style="width:42px;" oninput="updateSummary()"> = $<input id="usd-unit" type="number" value="3.37" step="0.01" min="0.01" class="rate-pill-input" oninput="updateSummary()"> USD
    </div>
  </div>

  <div class="section-title">Theme MD</div>
  <div class="items-list" id="items-list"></div>

  <div class="section-title">滿額贈小卡</div>
  <div class="gift-detail">
    <div class="gift-detail-header">
      🎁 每滿 ₩50,000 贈 1 張，無上限
    </div>
    <div class="gift-milestones">
      <div class="milestone" id="m1">
        <div class="milestone-label">目前獲得</div>
        <div class="milestone-amount" id="gift-count">0 張</div>
        <div class="milestone-usd" id="gift-spent">消費 ₩0</div>
        <div class="milestone-reward">每 ₩50,000 加一張</div>
      </div>
      <div class="milestone" id="m2">
        <div class="milestone-label">距下一張</div>
        <div class="milestone-amount" id="gift-next-amt">₩50,000</div>
        <div class="milestone-usd" id="gift-next-usd">≈ $33.70</div>
        <div class="milestone-reward" id="gift-next-label">還差 ₩50,000</div>
      </div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="progress-hint" id="prog-hint">目前消費 ₩0，距第 1 張還差 ₩50,000（$33.70）</div>
  </div>

  <button class="reset-btn" onclick="resetAll()">↺ 重置所有數量</button>

  <div class="footer">
    價格以活動公告為準・匯率僅供參考
  </div>
</div>

<script>
const productImages = {
  0: "IMG_1048.jpg",
  1: "IMG_1049.jpg",
  2: "IMG_1050.jpg",
  3: "IMG_1051.jpg",
  4: "IMG_1052.jpg",
  5: "IMG_1054.jpg",
  6: "IMG_1055.jpg",
  7: "IMG_1056.jpg",
  8: "IMG_1057.jpg",
  9: "IMG_1058.jpg",
  10: "IMG_1059.jpg",
  11: "IMG_1060.jpg",
  12: "IMG_1061.jpg",
  13: "IMG_1062.jpg",
  14: "IMG_1063.jpg",
  15: "IMG_1064.jpg"
};

const T1 = 50000;
const products = [
  { name: "어린이 아크릴 스탠드", sub: "兒童壓克力立牌（슈라카 / 테이 ver.）", price: 12000 },
  { name: "쉬폰 포스터", sub: "布海報", price: 18000 },
  { name: "포스터", sub: "海報", price: 13000 },
  { name: "슈라카 러그", sub: "舒拉卡地毯", price: 30000 },
  { name: "렌티큘러 카드", sub: "變化書籤（隨機 4 款）", price: 5000 },
  { name: "캔뱃지 세트", sub: "徽章組（성인 / 어린이 ver.）", price: 9000 },
  { name: "백야 미니 필름 패키지", sub: "迷你底片組（隨機 4 款）", price: 7000 },
  { name: "컬렉션 미니 스탠드", sub: "迷你立牌（隨機 10 款）", price: 4200 },
  { name: "타로팩", sub: "塔羅牌（隨機 10 款）", price: 5000 },
  { name: "고블렛잔", sub: "高腳杯組", price: 29000 },
  { name: "룸 스프레이", sub: "室內香氛", price: 30000 },
  { name: "마우스 패드 패키지", sub: "滑鼠墊套組", price: 30000 },
  { name: "펜리르 리유저블백", sub: "環保袋", price: 14000 },
  { name: "펜리르 알 아크릴 키링", sub: "壓克力鑰匙圈（롬 / 람 ver.）", price: 17500 },
  { name: "펜리르 키링", sub: "鑰匙圈", price: 13500 },
  { name: "컬렉션 포토카드", sub: "收藏照片卡（隨機 18 款）", price: 5000 },
];
function getKrwRate() {
  const unit = parseFloat(document.getElementById("krw-unit").value) || 5000;
  const usdVal = parseFloat(document.getElementById("usd-unit").value) || 3.37;
  return usdVal / unit;
}

function getUsdTwdRate() {
  return parseFloat(document.getElementById("usd-twd-rate").value) || 32.5;
}

function krw(n) { return "₩" + n.toLocaleString(); }
function usd(n) { return "$" + (n * getKrwRate()).toFixed(2); }
function twd(n) { return Math.round(n * getKrwRate() * getUsdTwdRate()); }

const qtys = new Array(products.length).fill(0);

function buildList() {
  const list = document.getElementById("items-list");
  list.innerHTML = "";
  products.forEach((p, i) => {
    const row = document.createElement("div");
    row.className = "item-row" + (qtys[i] > 0 ? " active" : "");
    row.id = "row-" + i;
    row.innerHTML = `
      <img class="item-img" src="${productImages[i]}" alt="${p.name}" loading="lazy">
      <div>
        <div class="item-name">${p.name}</div>
        <div class="item-sub">${p.sub}</div>
      </div>
      <div class="item-price-col">
        <div class="item-price-krw">${krw(p.price)}</div>
        <div class="item-price-usd">${usd(p.price)}</div>
      </div>
      <div class="qty-wrap">
        <button class="qty-btn" onclick="change(${i},-1)" aria-label="減少">−</button>
        <span class="qty-val" id="qty-${i}">${qtys[i]}</span>
        <button class="qty-btn" onclick="change(${i},1)" aria-label="增加">+</button>
      </div>
    `;
    list.appendChild(row);
  });
}

function change(i, d) {
  qtys[i] = Math.max(0, qtys[i] + d);
  const el = document.getElementById("qty-" + i);
  if (el) el.textContent = qtys[i];
  const row = document.getElementById("row-" + i);
  if (row) row.classList.toggle("active", qtys[i] > 0);
  updateSummary();
}

function resetAll() {
  qtys.fill(0);
  buildList();
  updateSummary();
}

function updateSummary() {
  const total = products.reduce((s, p, i) => s + p.price * qtys[i], 0);

  document.getElementById("top-krw").textContent = krw(total);
  document.getElementById("top-usd").textContent = usd(total);
  document.getElementById("top-twd").textContent = twd(total).toLocaleString();

  const cards = Math.floor(total / T1);
  const remainder = total % T1;
  const toNext = T1 - remainder;

  document.getElementById("gift-count").textContent = cards + " 張";
  document.getElementById("gift-spent").textContent = "消費 " + krw(total);
  document.getElementById("gift-next-amt").textContent = krw(toNext);
  document.getElementById("gift-next-usd").textContent = "≈ " + usd(toNext);
  document.getElementById("gift-next-label").textContent = "還差 " + krw(toNext);

  document.getElementById("m1").classList.toggle("reached", cards > 0);

  document.getElementById("prog-fill").style.width = ((remainder / T1) * 100).toFixed(1) + "%";

  const badge = document.getElementById("top-badge-block");
  const badgeVal = document.getElementById("top-badge-val");
  badgeVal.textContent = cards;
  badge.className = "gift-badge-block " + (cards === 0 ? "gift-none-block" : cards >= 2 ? "gift-two-block" : "gift-one-block");

  if (cards === 0) {
    document.getElementById("prog-hint").textContent = `目前消費 ${krw(total)}，距第 1 張還差 ${krw(toNext)}（${usd(toNext)}）`;
  } else {
    document.getElementById("prog-hint").textContent = `已獲得 ${cards} 張！距下一張還差 ${krw(toNext)}（${usd(toNext)}）`;
  }
}

buildList();
updateSummary();
</script>
</body>
</html>
