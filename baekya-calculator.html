<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>백야의 꽃길 MD 計算器</title>
<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #FFFDF9;
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --gold-dark: #8B6914;
    --brown: #5C3D1E;
    --brown-light: #8B6347;
    --text: #2C1810;
    --text-muted: #7A5C47;
    --text-light: #A8876E;
    --border: rgba(201, 168, 76, 0.25);
    --border-strong: rgba(201, 168, 76, 0.5);
    --surface: rgba(255, 253, 249, 0.9);
    --green-bg: #EAF5E9;
    --green-text: #2D6A2D;
    --amber-bg: #FDF3DC;
    --amber-text: #7A4F00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', 'Noto Serif TC', serif;
    background-color: var(--cream);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(201,168,76,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(201,168,76,0.06) 0%, transparent 50%);
  }

  .page-wrapper {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .header-eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .header h1 {
    font-size: 26px;
    font-weight: normal;
    color: var(--brown);
    letter-spacing: 0.05em;
    line-height: 1.3;
  }
  .header h1 em {
    font-style: italic;
    color: var(--gold-dark);
  }
  .header-sub {
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-light);
    font-family: 'Helvetica Neue', sans-serif;
    letter-spacing: 0.05em;
  }
  .rate-pill {
    display: inline-block;
    margin-top: 8px;
    background: var(--amber-bg);
    color: var(--amber-text);
    font-size: 11px;
    font-family: 'Helvetica Neue', sans-serif;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(201,168,76,0.3);
  }

  /* Summary sticky */
  .summary-sticky {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(250,247,242,0.97);
    border-bottom: 1px solid var(--border);
    padding: 10px 0;
    margin-bottom: 24px;
    backdrop-filter: blur(8px);
  }
  .summary-inner {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .summary-total-label {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'Helvetica Neue', sans-serif;
  }
  .summary-total-amount {
    font-size: 22px;
    font-weight: normal;
    color: var(--brown);
    letter-spacing: 0.02em;
  }
  .summary-total-usd {
    font-size: 13px;
    color: var(--text-light);
    font-family: 'Helvetica Neue', sans-serif;
  }
  .summary-gift {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .gift-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .gift-none { background: #EEE8DF; color: var(--text-light); }
  .gift-one  { background: var(--amber-bg); color: var(--amber-text); }
  .gift-two  { background: var(--green-bg); color: var(--green-text); }

  /* Section */
  .section-title {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    padding-left: 2px;
  }

  /* Item rows */
  .items-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 32px;
  }

  .item-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 10px;
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .item-row:hover { border-color: var(--border-strong); }
  .item-row.active {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px rgba(201,168,76,0.15);
  }

  .item-name {
    font-size: 14px;
    color: var(--text);
    line-height: 1.3;
  }
  .item-sub {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
  }
  .item-price-col {
    text-align: right;
    min-width: 72px;
  }
  .item-price-krw {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
  }
  .item-price-usd {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    color: var(--text-light);
  }

  .qty-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .qty-btn {
    width: 30px;
    height: 30px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    background: var(--cream);
    color: var(--brown);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.15s;
    font-family: 'Helvetica Neue', sans-serif;
  }
  .qty-btn:hover { background: var(--gold-light); border-color: var(--gold); }
  .qty-btn:active { transform: scale(0.94); }
  .qty-val {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 15px;
    font-weight: 600;
    min-width: 22px;
    text-align: center;
    color: var(--brown);
  }

  /* Progress / gift detail */
  .gift-detail {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 20px;
  }
  .gift-detail-header {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .gift-milestones {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .milestone {
    background: var(--cream);
    border-radius: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .milestone.reached {
    border-color: var(--gold);
    background: var(--amber-bg);
  }
  .milestone-label {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-light);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .milestone-amount {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--brown);
  }
  .milestone-usd {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    color: var(--text-light);
    margin-top: 1px;
  }
  .milestone-reward {
    font-size: 11px;
    color: var(--gold-dark);
    margin-top: 4px;
  }
  .milestone.reached .milestone-label { color: var(--amber-text); }
  .milestone.reached .milestone-amount { color: var(--gold-dark); }

  .progress-track {
    height: 5px;
    background: #EDE5D8;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-light), var(--gold));
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .progress-hint {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    color: var(--text-light);
    margin-top: 7px;
  }

  /* Reset */
  .reset-btn {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'Helvetica Neue', sans-serif;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s, color 0.2s;
  }
  .reset-btn:hover { background: #EEE8DF; color: var(--brown); }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.05em;
  }

  @media (max-width: 480px) {
    .header h1 { font-size: 21px; }
    .item-row { grid-template-columns: 1fr; gap: 8px; }
    .item-row > div:nth-child(2) { display: none; }
    .item-price-col { display: none; }
    .qty-wrap { justify-content: flex-start; }
    .gift-milestones { grid-template-columns: 1fr; }
    .summary-inner { flex-direction: column; align-items: flex-start; gap: 6px; }
  }
</style>
</head>
<body>

<div class="summary-sticky" id="sticky-bar">
  <div class="summary-inner">
    <div>
      <div class="summary-total-label">總金額</div>
      <div class="summary-total-amount" id="top-krw">₩0</div>
      <div class="summary-total-usd" id="top-usd">$0.00</div>
    </div>
    <div class="summary-gift">
      滿額贈卡
      <span class="gift-badge gift-none" id="top-badge">未達標</span>
    </div>
  </div>
</div>

<div class="page-wrapper">

  <div class="header">
    <div class="header-eyebrow">MD 購買計算器</div>
    <h1><em>백야의 꽃길</em><br>白夜的花路</h1>
    <div class="header-sub">選擇商品數量，即時換算金額與滿額特典</div>
    <div class="rate-pill">匯率參考：₩5,000 = $3.37 USD</div>
  </div>

  <div class="section-title">Theme MD</div>
  <div class="items-list" id="items-list"></div>

  <div class="section-title">滿額贈小卡</div>
  <div class="gift-detail">
    <div class="gift-detail-header">
      🎁 每人上限 2 張
    </div>
    <div class="gift-milestones">
      <div class="milestone" id="m1">
        <div class="milestone-label">第 1 張門檻</div>
        <div class="milestone-amount">₩50,000</div>
        <div class="milestone-usd">≈ $33.70</div>
        <div class="milestone-reward">贈小卡 1 張</div>
      </div>
      <div class="milestone" id="m2">
        <div class="milestone-label">第 2 張門檻</div>
        <div class="milestone-amount">₩100,000</div>
        <div class="milestone-usd">≈ $67.40</div>
        <div class="milestone-reward">贈小卡 2 張</div>
      </div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="progress-hint" id="prog-hint">目前消費 ₩0，距第 1 張還差 ₩50,000（$33.70）</div>
  </div>

  <button class="reset-btn" onclick="resetAll()">↺ 重置所有數量</button>

  <div class="footer">
    價格以活動公告為準・匯率僅供參考
  </div>
</div>

<script>
const RATE = 3.37 / 5000;
const T1 = 50000, T2 = 100000;

const products = [
  { name: "어린이 아크릴 스탠드", sub: "兒童壓克力立牌（슈라카 / 테이 ver.）", price: 12000 },
  { name: "쉬폰 포스터", sub: "雪紡海報", price: 18000 },
  { name: "포스터", sub: "海報", price: 13000 },
  { name: "슈라카 러그", sub: "地毯", price: 30000 },
  { name: "렌티큘러 카드", sub: "幻彩卡（隨機 4 款選 1）", price: 5000 },
  { name: "캔뱃지 세트", sub: "徽章組（성인 / 어린이 ver.）", price: 9000 },
  { name: "백야 미니 필름 패키지", sub: "底片包（隨機）", price: 7000 },
  { name: "컬렉션 미니 스탠드", sub: "迷你立牌（隨機 10 款選 1）", price: 4200 },
  { name: "타로팩", sub: "塔羅牌（隨機 10 套選 1）", price: 5000 },
  { name: "고블렛잔", sub: "高腳杯組", price: 29000 },
  { name: "룸 스프레이", sub: "室內噴霧", price: 30000 },
  { name: "마우스 패드 패키지", sub: "滑鼠墊套組", price: 30000 },
  { name: "펜리르 리유저블백", sub: "環保袋", price: 14000 },
  { name: "펜리르 알 아크릴 키링", sub: "壓克力鑰匙圈（롬 / 람 ver.）", price: 17500 },
  { name: "펜리르 키링", sub: "鑰匙圈", price: 13500 },
  { name: "컬렉션 포토카드", sub: "收藏照片卡（隨機 18 款選 3）", price: 5000 },
];

const qtys = new Array(products.length).fill(0);

function krw(n) { return "₩" + n.toLocaleString(); }
function usd(n) { return "$" + (n * RATE).toFixed(2); }

function buildList() {
  const list = document.getElementById("items-list");
  list.innerHTML = "";
  products.forEach((p, i) => {
    const row = document.createElement("div");
    row.className = "item-row" + (qtys[i] > 0 ? " active" : "");
    row.id = "row-" + i;
    row.innerHTML = `
      <div>
        <div class="item-name">${p.name}</div>
        <div class="item-sub">${p.sub}</div>
      </div>
      <div class="item-price-col">
        <div class="item-price-krw">${krw(p.price)}</div>
        <div class="item-price-usd">${usd(p.price)}</div>
      </div>
      <div class="qty-wrap">
        <button class="qty-btn" onclick="change(${i},-1)" aria-label="減少">−</button>
        <span class="qty-val" id="qty-${i}">${qtys[i]}</span>
        <button class="qty-btn" onclick="change(${i},1)" aria-label="增加">+</button>
      </div>
    `;
    list.appendChild(row);
  });
}

function change(i, d) {
  qtys[i] = Math.max(0, qtys[i] + d);
  const el = document.getElementById("qty-" + i);
  if (el) el.textContent = qtys[i];
  const row = document.getElementById("row-" + i);
  if (row) row.classList.toggle("active", qtys[i] > 0);
  updateSummary();
}

function resetAll() {
  qtys.fill(0);
  buildList();
  updateSummary();
}

function updateSummary() {
  const total = products.reduce((s, p, i) => s + p.price * qtys[i], 0);

  document.getElementById("top-krw").textContent = krw(total);
  document.getElementById("top-usd").textContent = usd(total);

  const badge = document.getElementById("top-badge");
  const m1 = document.getElementById("m1");
  const m2 = document.getElementById("m2");
  const fill = document.getElementById("prog-fill");
  const hint = document.getElementById("prog-hint");

  m1.classList.toggle("reached", total >= T1);
  m2.classList.toggle("reached", total >= T2);

  if (total >= T2) {
    badge.textContent = "2 張 ✓";
    badge.className = "gift-badge gift-two";
    fill.style.width = "100%";
    hint.textContent = "已達最高門檻！獲得贈卡 2 張 🎉";
  } else if (total >= T1) {
    badge.textContent = "1 張 ✓";
    badge.className = "gift-badge gift-one";
    const rem = T2 - total;
    fill.style.width = ((total / T2) * 100).toFixed(1) + "%";
    hint.textContent = `已獲得 1 張！距第 2 張還差 ${krw(rem)}（${usd(rem)}）`;
  } else {
    badge.textContent = "未達標";
    badge.className = "gift-badge gift-none";
    const rem = T1 - total;
    fill.style.width = ((total / T1) * 100).toFixed(1) + "%";
    hint.textContent = `目前消費 ${krw(total)}，距第 1 張還差 ${krw(rem)}（${usd(rem)}）`;
  }
}

buildList();
updateSummary();
</script>
</body>
</html>
